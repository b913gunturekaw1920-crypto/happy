<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Siswa</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            background: rgb(0, 0, 0);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .success {
            display: none;
            background: #d4edda;
            color: #00ff3c;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📚 Pendaftaran Siswa Baru BUB</h1>
        <form id="formPendaftaran">
            <label for="nama">Nama Lengkap:</label>
            <input type="text" id="nama" required>

            <label for="email">Email:</label>
            <input type="email" id="email" required>

            <label for="usia">Usia:</label>
            <input type="number" id="usia" min="5" max="18" required>

            <label for="kelas">Kelas yang Diinginkan:</label>
            <select id="kelas" required>
                <option value="">Pilih Kelas</option>
                <option value="X">X (Kelas 10)</option>
                <option value="XI">XI (Kelas 11)</option>
                <option value="XII">XII (Kelas 12)</option>
            </select>

            <label for="alamat">Alamat:</label>
            <textarea id="alamat" rows="4" required></textarea>

            <button type="submit">Daftar Sekarang</button>

            <div id="successMsg" class="success">
                ✅ Pendaftaran berhasil! Terima kasih telah mendaftar.
            </div>
        </form>
    </div>

    <script>
        document.getElementById('formPendaftaran').addEventListener('submit', function(e) {
            e.preventDefault();
            // Simulate submission
            document.getElementById('successMsg').style.display = 'block';
            this.reset();
            setTimeout(() => {
                document.getElementById('successMsg').style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
