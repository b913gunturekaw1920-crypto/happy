<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Selamat Ulang Tahun Sayang! 🎉</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .heart { color: #ff69b4; font-size: 2em; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 { font-size: 3em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin: 0.5em 0; }
        .message { font-size: 1.5em; text-align: center; max-width: 600px; margin: 20px; }
        .photo-gallery { display: flex; gap: 20px; margin: 40px 0; flex-wrap: wrap; justify-content: center; }
        .photo { width: 200px; height: 200px; object-fit: cover; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s; }
        .photo:hover { transform: scale(1.05); }
        #countdown { font-size: 2em; font-weight: bold; margin: 30px 0; background: rgba(255,255,255,0.2); padding: 20px; border-radius: 20px; }
        .editable-section { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px; }
        #editPanel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            max-width: 300px;
        }
        #editPanel input, #editPanel button { width: 100%; margin: 10px 0; padding: 10px; }
        button { background: #ff69b4; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e55a9b; }
        .cake { font-size: 4em; animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <h1><span class="heart">💕</span> Selamat Ulang Tahun <span id="namaPacar">SAYANGG</span>! <span class="heart">💕</span></h1>
    <div class="message" id="pesanUtama">
        Setiap hari bersamamu adalah hadiah terbaik. Semoga tahun ini penuh kebahagiaan, cinta, dan mimpi yang jadi nyata. Aku cinta kamu selamanya! ❤️
    </div>
    
    <div class="cake">🎂</div>
    
    <div id="countdown">
        🎂 Bentar Lagi Ada yang Tambah Tua Nih: <br>
        <span id="timer"></span>
    </div>
    
    <div class="photo-gallery">
        <img class="photo" src="WhatsApp Image 2026-04-03 at 23.31.05.jpeg" alt="Foto Bersama 1" id="foto1">
        <img class="photo" src="WhatsApp Image 2026-04-03 at 23.31.05h.jpeg" alt="Foto Bersama 2" id="foto2">
        <img class="photo" src="WhatsApp Image 2026-04-03 at 23.31.05t.jpeg" alt="Foto Bersama 3" id="foto3">
    </div>

    <!-- Editable Panel (SECRET MODE: klik 3x cepat di h1 untuk buka) -->
    <div id="editPanel">
        <h3>✏️ Edit Website</h3>
        <input type="text" id="editNama" placeholder="Nama pacar">
        <textarea id="editPesan" placeholder="Pesan utama"></textarea>
        <input type="date" id="editBirthday">
        <input type="url" id="editFoto1" placeholder="URL Foto 1">
        <input type="url" id="editFoto2" placeholder="URL Foto 2">
        <input type="url" id="editFoto3" placeholder="URL Foto 3">
        <button onclick="saveEdits()">💾 Simpan</button>
        <button onclick="closeEdit()">❌ Tutup</button>
    </div>

    <script>
        // Editable functionality
        let editMode = false;
        let clickCount = 0;
        document.querySelector('h1').addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 3) {
                document.getElementById('editPanel').style.display = 'block';
                editMode = true;
                clickCount = 0;
                loadCurrentValues();
            }
            setTimeout(() => clickCount = 0, 1000);
        });

        function loadCurrentValues() {
            document.getElementById('editNama').value = document.getElementById('namaPacar').textContent;
            document.getElementById('editPesan').value = document.getElementById('pesanUtama').textContent;
            // Load date from localStorage or default
            document.getElementById('editBirthday').value = localStorage.getItem('birthdayDate') || '';
            document.getElementById('editFoto1').value = document.getElementById('foto1').src;
            document.getElementById('editFoto2').value = document.getElementById('foto2').src;
            document.getElementById('editFoto3').value = document.getElementById('foto3').src;
        }

        function saveEdits() {
            const nama = document.getElementById('editNama').value || 'Sayangku';
            const pesan = document.getElementById('editPesan').value || 'Pesan default';
            const birthday = document.getElementById('editBirthday').value;
            const foto1 = document.getElementById('editFoto1').value;
            const foto2 = document.getElementById('editFoto2').value;
            const foto3 = document.getElementById('editFoto3').value;

            document.getElementById('namaPacar').textContent = nama;
            document.getElementById('pesanUtama').textContent = pesan;
            if (foto1) document.getElementById('foto1').src = foto1;
            if (foto2) document.getElementById('foto2').src = foto2;
            if (foto3) document.getElementById('foto3').src = foto3;

            if (birthday) {
                localStorage.setItem('birthdayDate', birthday);
                updateCountdown(birthday);
            }

            alert('✅ Perubahan tersimpan! Refresh halaman untuk efek penuh.');
        }

        function closeEdit() {
            document.getElementById('editPanel').style.display = 'none';
        }

        // Countdown logic
        function updateCountdown(birthdayStr = localStorage.getItem('birthdayDate') || '2003-10-15') {
            const birthday = new Date(birthdayStr + 'T00:00:00');
            const now = new Date();
            const nextBirthday = new Date(birthday.getFullYear() + (now.getFullYear() - birthday.getFullYear() + 1), birthday.getMonth(), birthday.getDate());
            if (nextBirthday < now) nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);

            const diff = nextBirthday - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('timer').innerHTML = `${days} hari ${hours} jam ${minutes} menit`;
        }

        // Update countdown every minute
        updateCountdown();
        setInterval(updateCountdown, 60000);

        // Confetti effect on load (optional fun)
        function confetti() {
            // Simple canvas confetti
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            document.body.appendChild(canvas);
            // ... basic confetti logic (simplified)
            setTimeout(() => canvas.remove(), 5000);
        }
        window.onload = () => setTimeout(confetti, 1000);
    </script>
    </div> 

    <script>
        function updateTimer() {
            const target = new Date("April 6, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                days + " hari " + hours + " jam " + minutes + " menit " + seconds + " detik";
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body> </html>
</body>
</html>
